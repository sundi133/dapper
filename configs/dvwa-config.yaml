# DVWA configuration for local testing
# DVWA runs on host port 4280, accessible from Docker as host.docker.internal

authentication:
  login_type: form
  login_url: "http://host.docker.internal:4280/login.php"
  credentials:
    username: "admin"
    password: "password"

  login_flow:
    - "Type $username into the Username field"
    - "Type $password into the Password field"
    - "Click the 'Login' button"

  success_condition:
    type: url_contains
    value: "index.php"

rules:
  avoid:
    - description: "Skip logout functionality"
      type: path
      url_path: "/logout.php"

    - description: "Skip setup page to avoid resetting the database"
      type: path
      url_path: "/setup.php"
