title: Dapper
description: Fully autonomous AI pentester — built to break your web app before anyone else does.
url: "https://docs.dapper.votal.ai"
baseurl: ""

remote_theme: just-the-docs/just-the-docs

color_scheme: light
search_enabled: true
heading_anchors: true

# Apply the theme's default layout to every page (home overrides with layout: home).
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Callouts (use with {: .note } / {: .warning } / {: .tip } / {: .danger })
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  danger:
    title: Important
    color: red

# Mermaid diagrams
mermaid:
  version: "9.1.7"

aux_links:
  "GitHub":
    - "https://github.com/sundi133/dapper"
  "votal.ai":
    - "https://www.votal.ai"

aux_links_new_tab: true

footer_content: 'Dapper Lite is released under the <a href="https://github.com/sundi133/dapper/blob/main/LICENSE">AGPL-3.0</a>. Interested in Dapper Pro? <a href="mailto:info@votal.ai">info@votal.ai</a>.'

# Tell Jekyll which files to ignore.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
